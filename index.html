<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D构件DIY搭建平台</title>
  <style>
    * {
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a1a;
      font-family: sans-serif;
    }

    canvas {
      display: block;
    }

    .ui-tips {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: #aaa;
      font-size: 11px;
      pointer-events: none;
      z-index: 10;
    }

    .address-bar {
      position: absolute;
      top: 40px;
      left: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
      z-index: 20;
    }

    #save-path {
      flex: 1;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #444;
      color: #0ff;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
    }

    #select-tag {
      position: absolute;
      top: 85px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff3b30;
      color: white;
      padding: 4px 15px;
      border-radius: 20px;
      font-size: 12px;
      display: none;
      z-index: 10;
    }

    .system-box {
      position: absolute;
      bottom: 30px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 25;
    }

    .control-box {
      position: absolute;
      bottom: 30px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 25;
    }

    .btn {
      width: 55px;
      height: 55px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      color: white;
      font-size: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      cursor: pointer;
      user-select: none;
    }

    .btn span {
      font-size: 10px;
      margin-top: 2px;
    }

    .btn-sys {
      background: rgba(0, 122, 255, 0.3);
    }

    .btn-open {
      background: rgba(255, 152, 0, 0.4);
    }

    .btn-upload {
      background: rgba(52, 199, 89, 0.34);
    }

    .btn-multi {
      background: rgba(175, 82, 222, 0.34);
    }

    .btn-multi.active {
      background: rgba(175, 82, 222, 0.72);
      border-color: rgba(255, 255, 255, 0.45);
    }

    .btn-delete {
      background: rgba(255, 59, 48, 0.36);
    }

    .upload-status {
      position: absolute;
      top: 92px;
      right: 14px;
      min-width: 150px;
      padding: 10px 14px;
      border-radius: 14px;
      color: white;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
      background: rgba(0, 0, 0, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.32);
      z-index: 45;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .upload-status.show {
      opacity: 1;
      transform: translateY(0);
    }

    .upload-status.loading {
      color: #9ee7ff;
    }

    .upload-status.success {
      color: #b8ffca;
    }

    .btn:active {
      transform: scale(0.9);
      background: #ff3b30;
    }

    #file-input {
      display: none;
    }

    /* ===============================
       预设方案入口按钮 + 弹出式方案列表
       =============================== */
    .preset-entry {
      position: absolute;
      top: 92px;
      left: 14px;
      height: 42px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: white;
      font-size: 13px;
      font-weight: bold;
      background: rgba(88, 86, 214, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 14px;
      z-index: 35;
      backdrop-filter: blur(10px);
      cursor: pointer;
      user-select: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .preset-entry:active {
      transform: scale(0.96);
      background: rgba(88, 86, 214, 0.72);
    }

    .preset-panel {
      position: absolute;
      top: 142px;
      left: 14px;
      width: 260px;
      max-height: 58vh;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.64);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 10px;
      z-index: 34;
      backdrop-filter: blur(12px);
      color: white;
      touch-action: pan-y;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.36);
    }

    .preset-panel.hidden {
      display: none;
    }

    .preset-panel::-webkit-scrollbar {
      width: 4px;
    }

    .preset-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 10px;
    }

    .preset-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .preset-title {
      font-size: 14px;
      font-weight: bold;
    }

    .preset-close {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 999px;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      cursor: pointer;
      font-size: 16px;
      line-height: 26px;
      text-align: center;
    }

    .preset-subtitle {
      font-size: 11px;
      line-height: 1.4;
      color: #bbb;
      margin-bottom: 9px;
    }

    .preset-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 9px;
      margin-bottom: 9px;
    }

    .preset-name {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .preset-desc {
      font-size: 11px;
      color: #cfcfcf;
      margin-bottom: 7px;
      line-height: 1.45;
    }

    .preset-meta {
      display: inline-block;
      font-size: 10px;
      color: #92d5ff;
      background: rgba(0, 122, 255, 0.18);
      border: 1px solid rgba(0, 122, 255, 0.25);
      border-radius: 999px;
      padding: 2px 7px;
      margin-bottom: 8px;
    }

    .preset-actions {
      display: flex;
      gap: 6px;
    }

    .preset-actions button {
      flex: 1;
      border: none;
      border-radius: 9px;
      padding: 7px 4px;
      color: white;
      font-size: 11px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .use-btn {
      background: rgba(52, 199, 89, 0.78);
    }

    .download-btn {
      background: rgba(0, 122, 255, 0.78);
    }

    .panel-tip {
      font-size: 10px;
      color: #aaa;
      line-height: 1.45;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 8px;
      margin-top: 4px;
    }



    /* ===============================
       模型库入口按钮 + 弹出式模型列表
       =============================== */
    .model-entry {
      position: absolute;
      top: 92px;
      left: 138px;
      height: 42px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: white;
      font-size: 13px;
      font-weight: bold;
      background: rgba(0, 150, 136, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 14px;
      z-index: 35;
      backdrop-filter: blur(10px);
      cursor: pointer;
      user-select: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .model-entry:active {
      transform: scale(0.96);
      background: rgba(0, 150, 136, 0.76);
    }

    .model-panel {
      position: absolute;
      top: 142px;
      left: 14px;
      width: 318px;
      max-height: 60vh;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 10px;
      z-index: 34;
      backdrop-filter: blur(12px);
      color: white;
      touch-action: pan-y;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.36);
    }

    .model-panel.hidden {
      display: none;
    }

    .model-panel::-webkit-scrollbar {
      width: 4px;
    }

    .model-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 10px;
    }

    .model-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .model-title {
      font-size: 14px;
      font-weight: bold;
    }

    .model-close {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 999px;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      cursor: pointer;
      font-size: 16px;
      line-height: 26px;
      text-align: center;
    }

    .model-subtitle {
      font-size: 11px;
      line-height: 1.4;
      color: #bbb;
      margin-bottom: 9px;
    }

    .model-category {
      margin-top: 10px;
    }

    .model-category:first-child {
      margin-top: 0;
    }

    .model-category-title {
      font-size: 12px;
      color: #9ee7ff;
      font-weight: bold;
      margin: 8px 0 7px;
      padding-left: 2px;
    }

    .model-card {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 13px;
      padding: 9px;
      margin-bottom: 8px;
    }

    .model-name {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 3px;
    }

    .model-desc {
      font-size: 10px;
      color: #cfcfcf;
      line-height: 1.4;
    }

    .model-load-btn {
      min-width: 54px;
      height: 32px;
      border: none;
      border-radius: 9px;
      color: white;
      background: rgba(52, 199, 89, 0.78);
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
    }

    .upload-status.error {
      color: #ffb3b3;
    }

    @media (max-width: 720px) {
      .preset-entry {
        top: 86px;
        left: 12px;
        height: 38px;
        padding: 0 12px;
        font-size: 12px;
      }

      .preset-panel {
        top: 130px;
        left: 12px;
        width: 220px;
        max-height: 52vh;
      }

      .upload-status {
        top: 86px;
        right: 12px;
        min-width: 130px;
        padding: 9px 12px;
        font-size: 12px;
      }

      .model-entry {
        top: 86px;
        left: 128px;
        height: 38px;
        padding: 0 12px;
        font-size: 12px;
      }

      .model-panel {
        top: 130px;
        left: 12px;
        width: 280px;
        max-height: 54vh;
      }

      .model-subtitle,
      .model-desc {
        font-size: 10px;
      }


      .preset-subtitle,
      .preset-desc,
      .panel-tip {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="ui-tips">用户自主DIY搭建：可自由编辑、按需加载模型，并支持多选删除</div>

  <div class="address-bar">
    <input type="text" id="save-path" placeholder="输入保存的文件名" value="我的建筑设计_1">
  </div>

  <div id="select-tag">已选中：构件整体</div>

  <div class="upload-status" id="upload-status">模型上传中</div>

  <input type="file" id="file-input" accept=".json">

  <!-- 预设方案库入口：默认只显示按钮，点击后展开方案列表 -->
  <div class="preset-entry" id="preset-toggle">🏛️<span>预设方案</span></div>

  <div class="preset-panel hidden" id="preset-panel">
    <div class="preset-header">
      <div class="preset-title">预设方案库</div>
      <button class="preset-close" id="preset-close">×</button>
    </div>
    <div class="preset-subtitle">可一键使用模板，也可下载 JSON 后再次导入</div>
    <div id="preset-list"></div>
    <div class="panel-tip">
      提示：预设方案只是参考模板，加载后仍可继续拖拽、升降、旋转、缩放和保存。
    </div>
  </div>

  <!-- 模型库入口：点击后显示分类模型，用户可按需加载到场景中 -->
  <div class="model-entry" id="model-toggle">🧩<span>模型库</span></div>

  <div class="model-panel hidden" id="model-panel">
    <div class="model-header">
      <div class="model-title">模型库</div>
      <button class="model-close" id="model-close">×</button>
    </div>
    <div class="model-subtitle">按类别选择模型，点击“加载”后会加入当前场景，可继续拖拽、旋转、缩放和保存。</div>
    <div id="model-list"></div>
    <div class="panel-tip">
      提示：这里是按需加载，不会一开始把所有大模型都加载进网页，后期更适合扩展大量模型。
    </div>
  </div>


  <div class="system-box">
    <div class="btn btn-sys btn-open" id="open-btn">📂<span>打开</span></div>
    <div class="btn btn-sys btn-upload" id="upload-btn">⬆️<span>上传</span></div>
    <div class="btn btn-sys btn-multi" id="multi-btn">☑<span>多选</span></div>
    <div class="btn btn-sys btn-delete" id="delete-btn">🗑<span>删除</span></div>
    <div class="btn btn-sys" id="undo-btn">↶<span>撤回</span></div>
    <div class="btn btn-sys" id="save-btn">💾<span>保存</span></div>
    <div class="btn btn-sys" id="reset-btn">🔄<span>重置</span></div>
  </div>

  <div class="control-box">
    <div class="btn" id="up-btn">▲<span>升</span></div>
    <div class="btn" id="down-btn">▼<span>降</span></div>
    <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.1)">
    <div class="btn" id="rotate-btn">↻<span>旋转</span></div>
    <div class="btn" id="plus-btn">＋<span>放大</span></div>
    <div class="btn" id="minus-btn">－<span>缩小</span></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
    import { KTX2Loader } from 'three/examples/jsm/loaders/KTX2Loader.js';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
    import { DragControls } from 'three/examples/jsm/controls/DragControls.js';
    import { MeshoptDecoder } from 'three/examples/jsm/libs/meshopt_decoder.module.js';

    // ===============================
    // 初始化场景
    // ===============================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(10, 10, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // ===============================
    // 全局变量
    // ===============================
    window.allComponents = [];
    const activeSelection = [];
    let currentSelected = null;
    let multiSelectMode = false;
    const historyStack = [];
    const EXPECTED_COMPONENT_COUNT = 1;

    // ===============================
    // 预设方案数据
    // 说明：
    // 1. 这里直接把方案写在 index.html 内部，不需要额外创建 presets 文件夹。
    // 2. “使用”按钮会把布局应用到当前场景。
    // 3. “下载”按钮会把该方案导出为 JSON 文件。
    // 4. 你以后可以先手动摆好模型，点击“保存”，再把保存出的 JSON 复制到这里。
    // ===============================
    const PRESET_LIST = [
      {
        id: 'single_house',
        name: '单房展示方案',
        desc: '打开后只保留一个小平房，适合作为最简洁的起始界面。',
        meta: '默认方案',
        fileName: '单房展示方案.json',
        layout: [
          {
            name: '小平房',
            baseName: '小平房',
            modelUrl: './model/xiaopingfang.glb',
            pos: { x: 0, y: 0, z: 0 },
            rot: { x: 0, y: 0, z: 0 },
            sca: { x: 1, y: 1, z: 1 }
          }
        ]
      },
      {
        id: 'free_start',
        name: '自由搭建起始方案',
        desc: '加载几个可用构件分散摆放，便于用户从零开始 DIY。',
        meta: '自由创作',
        fileName: '自由搭建起始方案.json',
        layout: [
          {
            name: '小平房',
            baseName: '小平房',
            modelUrl: './model/xiaopingfang.glb',
            pos: { x: -3.0, y: 0, z: 0 },
            rot: { x: 0, y: 0, z: 0 },
            sca: { x: 0.9, y: 0.9, z: 0.9 }
          },
          {
            name: '墙体整体',
            baseName: '墙体整体',
            modelUrl: './model/wall.glb',
            pos: { x: 1.5, y: 0, z: -2.2 },
            rot: { x: 0, y: 0, z: 0 },
            sca: { x: 0.8, y: 0.8, z: 0.8 }
          },
          {
            name: '柱子整体',
            baseName: '柱子整体',
            modelUrl: './model/pillar.glb',
            pos: { x: 3.5, y: 0, z: -2.2 },
            rot: { x: 0, y: 0, z: 0 },
            sca: { x: 0.8, y: 0.8, z: 0.8 }
          },
          {
            name: '斗拱整体',
            baseName: '斗拱整体',
            modelUrl: './model/dougong.glb',
            pos: { x: 3.5, y: 0, z: 1.0 },
            rot: { x: 0, y: 0, z: 0 },
            sca: { x: 0.8, y: 0.8, z: 0.8 }
          }
        ]
      }
    ];



    // ===============================
    // 模型库数据
    // 说明：
    // 1. category 是分类名称，会显示在模型库中。
    // 2. name 是加载到场景后的名称。
    // 3. url 必须和 GitHub 仓库 model 文件夹里的文件名完全一致。
    // 4. 新增模型时，只需要在下面继续添加一项即可。
    // ===============================
    const MODEL_LIBRARY = [
      {
        category: '基础构件',
        models: [
          { name: '墙体整体', desc: '基础墙体构件', url: './model/wall.glb' },
          { name: '柱子整体', desc: '基础柱类构件', url: './model/pillar.glb' },
          { name: '斗拱整体', desc: '基础斗拱构件', url: './model/dougong.glb' }
        ]
      },
      {
        category: '古建筑模型',
        models: [
          { name: '小平房', desc: '简易房屋参考模型', url: './model/xiaopingfang.glb' },
          { name: '古建3', desc: '古建筑组合模型', url: './model/gujian3.glb', targetSize: 5 },
          { name: '古建4', desc: '古建筑组合模型', url: './model/gujian4.glb', targetSize: 5 },
          { name: '古建5', desc: '古建筑组合模型', url: './model/gujian5.glb', targetSize: 5 },
          { name: '古建6', desc: '古建筑组合模型', url: './model/gujian6.glb', targetSize: 5 },
          { name: '古建7', desc: '古建筑组合模型', url: './model/gujian7.glb', targetSize: 5 }
        ]
      },
      {
        category: '装饰与家具',
        models: [
          { name: '家具', desc: '室内或场景陈设模型', url: './model/furniture1.glb' },
          { name: '墙体装饰', desc: '可用于围合或背景装饰', url: './model/wall.glb' },
          { name: '斗拱装饰', desc: '装饰性斗拱模型', url: './model/dougong.glb' },
          { name: '柱子装饰', desc: '装饰性柱类模型', url: './model/pillar.glb' }
        ]
      }
    ];

    // ===============================
    // 工具函数
    // ===============================
    function getLayoutData() {
      return window.allComponents.map(m => ({
        uid: m.userData.uid || '',
        name: m.userData.cnName,
        baseName: m.userData.baseName || m.userData.cnName,
        modelUrl: m.userData.modelUrl || '',
        pos: { x: m.position.x, y: m.position.y, z: m.position.z },
        rot: { x: m.rotation.x, y: m.rotation.y, z: m.rotation.z },
        sca: { x: m.scale.x, y: m.scale.y, z: m.scale.z }
      }));
    }

    function recordState() {
      const state = getLayoutData();
      historyStack.push(state);

      if (historyStack.length > 20) {
        historyStack.shift();
      }
    }

    async function restoreState(state) {
      clearSelection();

      const keepUids = new Set(state.map(item => item.uid).filter(Boolean));
      const toRemove = window.allComponents.filter(component => {
        const uid = component.userData.uid || '';
        return uid && !keepUids.has(uid);
      });

      toRemove.forEach(component => {
        removeComponent(component);
      });

      for (const item of state) {
        let target = null;

        if (item.uid) {
          target = window.allComponents.find(component => component.userData.uid === item.uid);
        }

        if (!target && item.modelUrl) {
          try {
            target = await loadComponent(item.modelUrl, item.name, {
              uid: item.uid || createComponentUid(),
              baseName: item.baseName || item.name
            });
          } catch (error) {
            console.error('撤回时模型恢复失败：', item, error);
          }
        }

        if (target) {
          target.position.set(item.pos.x, item.pos.y, item.pos.z);
          target.rotation.set(item.rot.x, item.rot.y, item.rot.z);
          target.scale.set(item.sca.x, item.sca.y, item.sca.z);
        }
      }
    }

    function waitForComponentsReady(timeout = 6000) {
      return new Promise(resolve => {
        const startTime = Date.now();

        const timer = setInterval(() => {
          if (
            window.allComponents.length >= EXPECTED_COMPONENT_COUNT ||
            Date.now() - startTime > timeout
          ) {
            clearInterval(timer);
            resolve();
          }
        }, 100);
      });
    }

    async function applyLayout(layoutData) {
      recordState();

      const notFound = [];

      for (const savedItem of layoutData) {
        let component = null;

        if (savedItem.uid) {
          component = window.allComponents.find(
            m => m.userData.uid === savedItem.uid
          );
        }

        if (!component) {
          component = window.allComponents.find(
            m => m.userData.cnName === savedItem.name
          );
        }

        // 如果是从模型库新增后保存的模型，而当前场景里还没有，则根据 modelUrl 自动重新加载。
        if (!component && savedItem.modelUrl) {
          try {
            component = await loadComponent(savedItem.modelUrl, savedItem.name, {
              baseName: savedItem.baseName || savedItem.name,
              uid: savedItem.uid || createComponentUid()
            });
          } catch (error) {
            console.error('布局中的模型加载失败：', savedItem, error);
          }
        }

        if (component) {
          component.position.set(
            savedItem.pos.x,
            savedItem.pos.y,
            savedItem.pos.z
          );

          component.rotation.set(
            savedItem.rot.x,
            savedItem.rot.y,
            savedItem.rot.z
          );

          component.scale.set(
            savedItem.sca.x,
            savedItem.sca.y,
            savedItem.sca.z
          );
        } else {
          notFound.push(savedItem.name);
        }
      }

      if (notFound.length > 0) {
        alert('以下构件没有找到：' + notFound.join('、'));
      }
    }

    function downloadJsonFile(data, fileName) {
      const blob = new Blob(
        [JSON.stringify(data, null, 2)],
        { type: 'application/json' }
      );

      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');

      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    function disposeComponent(component) {
      component.traverse(node => {
        if (!node.isMesh) return;

        if (node.geometry) {
          node.geometry.dispose();
        }

        const materials = Array.isArray(node.material)
          ? node.material
          : [node.material];

        materials.forEach(material => {
          if (!material) return;

          Object.keys(material).forEach(key => {
            const value = material[key];
            if (value && value.isTexture) {
              value.dispose();
            }
          });

          if (material.dispose) {
            material.dispose();
          }
        });
      });
    }

    function removeComponent(component) {
      scene.remove(component);
      disposeComponent(component);

      const index = window.allComponents.indexOf(component);
      if (index !== -1) {
        window.allComponents.splice(index, 1);
      }

      const selectedIndex = activeSelection.indexOf(component);
      if (selectedIndex !== -1) {
        activeSelection.splice(selectedIndex, 1);
      }

      if (currentSelected === component) {
        currentSelected = activeSelection[activeSelection.length - 1] || null;
      }
    }

    function setHighlight(target, color) {
      target.traverse(node => {
        if (!node.isMesh || !node.material) return;

        const materials = Array.isArray(node.material)
          ? node.material
          : [node.material];

        materials.forEach(mat => {
          if (mat.emissive) {
            mat.emissive.set(color);
          }
        });
      });
    }

    function updateSelectionView() {
      window.allComponents.forEach(component => {
        setHighlight(
          component,
          activeSelection.includes(component) ? 0x332222 : 0x000000
        );
      });

      const tag = document.getElementById('select-tag');

      if (activeSelection.length === 0) {
        tag.style.display = 'none';
        currentSelected = null;
        return;
      }

      if (activeSelection.length === 1) {
        currentSelected = activeSelection[0];
        tag.innerText = '选中：' + currentSelected.userData.cnName;
      } else {
        currentSelected = activeSelection[activeSelection.length - 1];
        tag.innerText = '已选中 ' + activeSelection.length + ' 个模型，可点击删除';
      }

      tag.style.display = 'block';
    }

    function clearSelection() {
      currentSelected = null;
      activeSelection.length = 0;
      updateSelectionView();
    }

    function selectComponent(target) {
      activeSelection.length = 0;
      activeSelection.push(target);
      currentSelected = target;
      updateSelectionView();
    }

    function toggleComponentSelection(target) {
      const index = activeSelection.indexOf(target);

      if (index === -1) {
        activeSelection.push(target);
        currentSelected = target;
      } else {
        activeSelection.splice(index, 1);
        currentSelected = activeSelection[activeSelection.length - 1] || null;
      }

      updateSelectionView();
    }

    function getSelectedComponents() {
      if (activeSelection.length > 0) {
        return [...activeSelection];
      }

      return currentSelected ? [currentSelected] : [];
    }

    function applyToSelected(callback) {
      const selected = getSelectedComponents();

      if (selected.length === 0) {
        alert('请先选中一个模型');
        return;
      }

      recordState();
      selected.forEach(callback);
      updateSelectionView();
    }

    // ===============================
    // 点击/触摸选中
    // ===============================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('pointerdown', event => {
      closePresetPanel();
      closeModelPanel();

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(window.allComponents, true);

      if (intersects.length > 0) {
        let target = intersects[0].object;

        while (target.parent && !window.allComponents.includes(target)) {
          target = target.parent;
        }

        if (window.allComponents.includes(target)) {
          if (multiSelectMode || event.ctrlKey || event.shiftKey) {
            toggleComponentSelection(target);
          } else {
            selectComponent(target);
          }
        }
      } else {
        clearSelection();
      }
    });

    // ===============================
    // 加载构件模型
    // 兼容说明：
    // 有些 GLB 虽然用户没有主动压缩，但模型来源本身可能已经包含 Draco、Meshopt 或 KTX2 贴图扩展。
    // 普通 GLTFLoader 遇到这些扩展会加载失败，所以这里统一加入解码器。
    // ===============================
    const loader = new GLTFLoader();

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/libs/draco/');
    loader.setDRACOLoader(dracoLoader);

    const ktx2Loader = new KTX2Loader();
    ktx2Loader.setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/libs/basis/');
    ktx2Loader.detectSupport(renderer);
    loader.setKTX2Loader(ktx2Loader);

    loader.setMeshoptDecoder(MeshoptDecoder);

    let componentUidCounter = 0;
    let librarySpawnIndex = 0;

    function createComponentUid() {
      componentUidCounter += 1;
      return 'component-' + Date.now() + '-' + componentUidCounter;
    }

    function getNextLibrarySpawnPosition() {
      const col = librarySpawnIndex % 4;
      const row = Math.floor(librarySpawnIndex / 4);
      librarySpawnIndex += 1;

      return new THREE.Vector3(
        -3.6 + col * 2.4,
        0,
        -4.8 + row * 2.4
      );
    }

    function makeUniqueComponentName(baseName) {
      const sameCount = window.allComponents.filter(component =>
        component.userData.baseName === baseName ||
        component.userData.cnName === baseName ||
        component.userData.cnName.startsWith(baseName + '-')
      ).length;

      return sameCount === 0 ? baseName : baseName + '-' + (sameCount + 1);
    }

    // 自动整理模型：解决模型加载后看不见、太大、太小、跑偏的问题
    function normalizeModel(root, targetSize = 3) {
      root.updateWorldMatrix(true, true);

      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();

      box.getSize(size);
      box.getCenter(center);

      const maxSide = Math.max(size.x, size.y, size.z);

      if (maxSide > 0) {
        const scale = targetSize / maxSide;
        root.scale.multiplyScalar(scale);
      }

      // 缩放后重新计算包围盒，把模型移动到原点附近
      root.updateWorldMatrix(true, true);
      const newBox = new THREE.Box3().setFromObject(root);
      const newCenter = new THREE.Vector3();
      newBox.getCenter(newCenter);

      root.position.x -= newCenter.x;
      root.position.z -= newCenter.z;

      // 让模型底部贴近地面 y=0
      root.updateWorldMatrix(true, true);
      const groundBox = new THREE.Box3().setFromObject(root);
      root.position.y -= groundBox.min.y;
    }

    function getFriendlyLoadError(error) {
      const message = String(
        error?.message ||
        error?.target?.statusText ||
        error ||
        '未知错误'
      );

      if (message.includes('Unexpected token') || message.includes('404')) {
        return '路径错误或文件未同步';
      }

      if (message.includes('DRACOLoader') || message.includes('KHR_draco_mesh_compression')) {
        return '模型需要 Draco 解码器';
      }

      if (message.includes('MeshoptDecoder') || message.includes('EXT_meshopt_compression')) {
        return '模型需要 Meshopt 解码器';
      }

      if (message.includes('KTX2Loader') || message.includes('KHR_texture_basisu')) {
        return '模型贴图需要 KTX2 解码器';
      }

      if (message.includes('Invalid') || message.includes('glTF') || message.includes('GLB')) {
        return '模型文件格式异常';
      }

      return '模型文件无法解析';
    }

    const loadComponent = (url, cnName, options = {}) => {
      return new Promise((resolve, reject) => {
        loader.load(
          url,
          gltf => {
            const root = gltf.scene;

            root.userData.uid = options.uid || createComponentUid();
            root.userData.cnName = cnName;
            root.userData.baseName = options.baseName || cnName;
            root.userData.modelUrl = url;

            // 关键修改：所有模型加载后自动居中、缩放、落地
            normalizeModel(root, options.targetSize || 3);

            if (options.position) {
              root.position.add(options.position);
            }

            if (options.rotation) {
              root.rotation.copy(options.rotation);
            }

            if (options.scale) {
              root.scale.multiply(options.scale);
            }

            scene.add(root);
            window.allComponents.push(root);

            resolve(root);
          },
          xhr => {
            if (xhr.total) {
              const percent = Math.round((xhr.loaded / xhr.total) * 100);
              showUploadStatus('模型加载中... ' + percent + '%', 'loading');
            } else {
              showUploadStatus('模型加载中...', 'loading');
            }
          },
          error => {
            console.error('模型加载失败：', cnName, url, error);
            reject(error);
          }
        );
      });
    };

    async function loadLibraryModel(modelItem) {
      showUploadStatus('模型加载中...', 'loading');

      try {
        recordState();
        const instanceName = makeUniqueComponentName(modelItem.name);
        const component = await loadComponent(modelItem.url, instanceName, {
          baseName: modelItem.name,
          position: getNextLibrarySpawnPosition(),
          targetSize: modelItem.targetSize || 3
        });

        selectComponent(component);
        closeModelPanel();
        showUploadStatus('模型加载成功：' + modelItem.name, 'success');
        hideUploadStatus(1300);
      } catch (error) {
        console.error(error);
        const reason = getFriendlyLoadError(error);
        showUploadStatus('模型加载失败：' + reason, 'error');
        hideUploadStatus(2600);
      }
    }

    // ===============================

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const sun = new THREE.DirectionalLight(0xffffff, 0.8);

    // ===============================
    // 渲染循环
    // ===============================
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.onresize = () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    };
  </script>
</body>
</html>
