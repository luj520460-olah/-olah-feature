<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D构件整体控制-全局变量版</title>
  <style>
    /* 样式保持不变 */
    * { touch-action: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
    canvas { display: block; }
    .ui-tips { position: absolute; top: 10px; width: 100%; text-align: center; color: #aaa; font-size: 11px; pointer-events: none; z-index: 10; }
    .address-bar { position: absolute; top: 40px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 20; }
    #save-path { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #0ff; padding: 8px; border-radius: 8px; font-size: 13px; }
    #select-tag { position: absolute; top: 85px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: white; padding: 4px 15px; border-radius: 20px; font-size: 12px; display: none; z-index: 10; }
    .system-box { position: absolute; bottom: 30px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
    .control-box { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
    .btn { width: 55px; height: 55px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; color: white; font-size: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    .btn span { font-size: 10px; margin-top: 2px; }
    .btn-sys { background: rgba(0, 122, 255, 0.3); } 
    .btn-open { background: rgba(255, 152, 0, 0.4); } 
    .btn:active { transform: scale(0.9); background: #ff3b30; }
    #file-input { display: none; }
  </style>
</head>
<body>

<div class="ui-tips">全局变量模式：支持控制台调试 window.allComponents</div>

<div class="address-bar">
  <input type="text" id="save-path" placeholder="输入保存的文件名" value="我的建筑设计_1">
</div>

<div id="select-tag">已选中：构件整体</div>

<input type="file" id="file-input" accept=".json">

<div class="system-box">
  <div class="btn btn-sys btn-open" id="open-btn">📂<span>打开</span></div>
  <div class="btn btn-sys" id="undo-btn">↶<span>撤回</span></div>
  <div class="btn btn-sys" id="save-btn">💾<span>保存</span></div>
  <div class="btn btn-sys" id="reset-btn">🔄<span>重置</span></div>
</div>

<div class="control-box">
  <div class="btn" id="up-btn">▲<span>升</span></div>
  <div class="btn" id="down-btn">▼<span>降</span></div>
  <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.1)">
  <div class="btn" id="rotate-btn">↻</div>
  <div class="btn" id="plus-btn">＋</div>
  <div class="btn" id="minus-btn">－</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
import { DragControls } from 'three/examples/jsm/controls/DragControls.js';

// --- 初始化场景 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(10, 10, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// --- 变量初始化：将 allComponents 定义在 window 上 ---
window.allComponents = []; 
const activeSelection = [];
let currentSelected = null;
const historyStack = [];

// --- 记录状态 ---
function recordState() {
    const state = window.allComponents.map(m => ({
        name: m.userData.cnName,
        pos: m.position.clone(),
        rot: m.rotation.clone(),
        sca: m.scale.clone()
    }));
    historyStack.push(state);
    if (historyStack.length > 20) historyStack.shift();
}

// --- 整体变换逻辑 ---
const dragControls = new DragControls(activeSelection, camera, renderer.domElement);
dragControls.transformGroup = true; 
dragControls.addEventListener('dragstart', () => { recordState(); controls.enabled = false; });
dragControls.addEventListener('dragend', () => controls.enabled = true);

// --- 点击选中 ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    // 使用全局变量进行射线检测
    const intersects = raycaster.intersectObjects(window.allComponents, true);

    if (intersects.length > 0) {
        let target = intersects[0].object;
        while (target.parent && !window.allComponents.includes(target)) target = target.parent;
        if (window.allComponents.includes(target)) {
            currentSelected = target;
            activeSelection.length = 0;
            activeSelection.push(target);
            window.allComponents.forEach(m => m.traverse(n => n.isMesh && n.material.emissive?.set(0x000000)));
            target.traverse(n => n.isMesh && n.material.emissive?.set(0x221111));
            document.getElementById('select-tag').innerText = "选中：" + target.userData.cnName;
            document.getElementById('select-tag').style.display = 'block';
        }
    } else if (!e.target.closest('.btn') && !e.target.closest('input')) {
        currentSelected = null;
        activeSelection.length = 0;
        window.allComponents.forEach(m => m.traverse(n => n.isMesh && n.material.emissive?.set(0x000000)));
        document.getElementById('select-tag').style.display = 'none';
    }
}, { passive: true });

// --- 加载构件 ---
const loader = new GLTFLoader();
const loadComponent = (url, cnName) => {
    loader.load(url, (gltf) => {
        const root = gltf.scene;
        root.userData.cnName = cnName;
        scene.add(root);
        // 存入全局变量
        window.allComponents.push(root);
    });
};

loadComponent('./model/1.glb', '屋顶整体');
loadComponent('./model/wall.glb', '墙体整体');
loadComponent('./model/pillar.glb', '柱子整体');
loadComponent('./model/dougong.glb', '斗拱整体');
loadComponent('./model/xiangulou.glb', '西安鼓楼');
loadComponent('./model/xiaopingfang.glb', '小平房');
  
// --- 功能1：保存到文件 ---
document.getElementById('save-btn').onclick = () => {
    const fileName = document.getElementById('save-path').value || "未命名设计";
    const layoutData = window.allComponents.map(m => ({
        name: m.userData.cnName,
        pos: { x: m.position.x, y: m.position.y, z: m.position.z },
        rot: { x: m.rotation.x, y: m.rotation.y, z: m.rotation.z },
        sca: { x: m.scale.x, y: m.scale.y, z: m.scale.z }
    }));

    const blob = new Blob([JSON.stringify(layoutData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = fileName + ".json";
    link.click();
    URL.revokeObjectURL(url);
    alert('保存成功');
};

// --- 功能2：打开文件 ---
const fileInput = document.getElementById('file-input');
document.getElementById('open-btn').onclick = () => fileInput.click();

fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            const data = JSON.parse(event.target.result);
            recordState();
            data.forEach(savedItem => {
                const component = window.allComponents.find(m => m.userData.cnName === savedItem.name);
                if (component) {
                    component.position.set(savedItem.pos.x, savedItem.pos.y, savedItem.pos.z);
                    component.rotation.set(savedItem.rot.x, savedItem.rot.y, savedItem.rot.z);
                    component.scale.set(savedItem.sca.x, savedItem.sca.y, savedItem.sca.z);
                }
            });
            alert('读取成功');
        } catch (err) { alert('文件错误'); }
        fileInput.value = "";
    };
    reader.readAsText(file);
};

// --- 撤回逻辑 ---
document.getElementById('undo-btn').onclick = () => {
    if (historyStack.length === 0) return;
    const last = historyStack.pop();
    last.forEach(item => {
        const target = window.allComponents.find(m => m.userData.cnName === item.name);
        if (target) {
            target.position.copy(item.pos);
            target.rotation.copy(item.rot);
            target.scale.copy(item.sca);
        }
    });
};

document.getElementById('reset-btn').onclick = () => {
    if(!confirm('重置吗？')) return;
    window.allComponents.forEach(m => { m.position.set(0,0,0); m.rotation.set(0,0,0); m.scale.set(1,1,1); });
};

// --- 操作按钮逻辑 ---
const step = 0.2;
document.getElementById('up-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.position.y += step; } };
document.getElementById('down-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.position.y -= step; } };
document.getElementById('rotate-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.rotation.y += Math.PI/2; } };
document.getElementById('plus-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.scale.multiplyScalar(1.1); } };
document.getElementById('minus-btn').onclick = () => { if(currentSelected){ recordState(); currentSelected.scale.divideScalar(1.1); } };

// --- 渲染 ---
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(5, 10, 7);
scene.add(sun);
scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));

function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
animate();

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
